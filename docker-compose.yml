version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tori-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - tori-db:/app
      - tori-uploads:/app/uploads
    environment:
      - ENVIRONMENT=development
      - SITE_URL=http://localhost
      - CORS_ORIGINS=http://localhost,http://127.0.0.1,https://arboraura.fi
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}

  nginx:
    image: nginx:alpine
    container_name: tori-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./robots.txt:/usr/share/nginx/html/robots.txt:ro
      - ./sitemap.xml:/usr/share/nginx/html/sitemap.xml:ro
    depends_on:
      - backend

volumes:
  tori-db:
  tori-uploads:
