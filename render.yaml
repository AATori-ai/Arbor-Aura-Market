services:
  - type: web
    name: aatori-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: CORS_ORIGINS
        value: https://www.arboraura.fi,https://arboraura.fi
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: smtp.hostinger.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: contact@arboraura.fi
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: contact@arboraura.fi
